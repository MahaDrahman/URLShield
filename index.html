<!DOCTYPE html>
<html>
<head>
    <title>URLShield - URL Checker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔐 URLShield Checker</h2>

    <input type="text" id="urlInput" placeholder="Enter URL here">
    <br>
    <button onclick="checkURL()">Check URL</button>

    <div id="result"></div>
</div>

<script>
function checkURL() {
    let url = document.getElementById("urlInput").value;
    let result = document.getElementById("result");

    if (url === "") {
        result.innerHTML = "❗ Please enter a URL";
        result.style.color = "black";
        return;
    }

    let score = 0;

    // Rule 1: Length
    if (url.length > 75) score++;

    // Rule 2: Contains @
    if (url.includes("@")) score += 2;

    // Rule 3: Too many dots
    if ((url.match(/\./g) || []).length > 3) score++;

    // Rule 4: No HTTPS
    if (!url.startsWith("https")) score++;

    // Rule 5: IP address
    let ipPattern = /(\d{1,3}\.){3}\d{1,3}/;
    if (ipPattern.test(url)) score += 2;

    // Rule 6: Suspicious words
    let words = ["login", "verify", "bank", "secure", "account"];
    for (let word of words) {
        if (url.toLowerCase().includes(word)) {
            score++;
            break;
        }
    }

    // Final result
    if (score >= 4) {
        result.innerHTML = "❌ Dangerous URL";
        result.style.color = "red";
    } else if (score >= 2) {
        result.innerHTML = "⚠️ Suspicious URL";
        result.style.color = "orange";
    } else {
        result.innerHTML = "✅ Safe URL";
        result.style.color = "green";
    }
}
</script>

</body>
</html>
